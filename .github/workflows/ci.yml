name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: mypy
        run: mypy src/

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: pytest unit tests
        run: pytest tests/unit/ -q
