target-version = "py310"
line-length = 100
src = ["src", "tests"]
# GRC-generated flowgraph Python files are not linted — auto-generated, do not follow project style.
extend-exclude = ["flowgraphs"]

[lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM", "TCH"]
ignore = ["B008"]

[lint.isort]
known-first-party = ["gr_dis"]
